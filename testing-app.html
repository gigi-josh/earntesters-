<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team - EarnTesters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fa;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
            font-size: 36px;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        .profile-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
        }
        .avatar img {
          border-radius: 50%;
          height: 100%;
          width: 100%;
          object-fit: cover;
        }

        .profile-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .profile-header .role {
            font-size: 14px;
            opacity: 0.9;
        }

        .profile-body {
            padding: 25px;
        }

        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .icon {
            width: 35px;
            height: 35px;
            background: #f0f3ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: #667eea;
            font-size: 18px;
        }

        .info-content {
            flex: 1;
        }

        .label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
        }

        .value {
            color: #333;
            font-size: 15px;
            font-weight: 500;
            word-break: break-word;
        }

        .value a {
            color: #667eea;
            text-decoration: none;
        }

        .value a:hover {
            text-decoration: underline;
        }

        .country-badge {
            display: inline-block;
            background: #e8f0fe;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Our Team</h1>
        
        <div class="team-grid">
            <!-- Joshua Giwa -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar"><img src="Screenshot_20260201-182540.png" alt="Photo of Josh the Creator"></div>
                    <h2>Joshua Giwa</h2>
                    <div class="role">Founder & Director</div>
                </div>
                <div class="profile-body">
                    <div class="info-row">
                        <div class="icon">📍</div>
                        <div class="info-content">
                            <div class="label">Location</div>
                            <div class="value">Jalingo, Nigeria <span class="country-badge">🇳🇬</span></div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="icon">📞</div>
                        <div class="info-content">
                            <div class="label">Phone</div>
                            <div class="value"><a href="tel:+2349025839789">+234 902 583 9789</a></div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="icon">✉️</div>
                        <div class="info-content">
                            <div class="label">Email</div>
                            <div class="value"><a href="mailto:joshuagiwa440@gmail.com">joshuagiwa440@gmail.com</a></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Les Àura -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar"><img src="#"alt="Photo of Les Àura"></div>
                    <h2>Keletso Lekone</h2>
                    <div class="role">Co-Founder & Director</div>
                </div>
                <div class="profile-body">
                    <div class="info-row">
                        <div class="icon">📍</div>
                        <div class="info-content">
                            <div class="label">Location</div>
                            <div class="value">South Africa <span class="country-badge">🇿🇦</span></div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="icon">📞</div>
                        <div class="info-content">
                            <div class="label">Phone</div>
                            <div class="value"><a href="tel:+27678901860">+27 67 890 1860</a></div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="icon">✉️</div>
                        <div class="info-content">
                            <div class="label">Email</div>
                            <div class="value"><a href="mailto:lekonekeletso23@gmail.com">lekonekeletso23@gmail.com</a></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
